<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genesis App</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./styles.css?v=genesis-phase90-render-target">
</head>
<body>
  <main class="phone-shell" id="genesis-app">
    <section class="app-screen is-active" id="view-genesis" data-screen="genesis"></section>
    <section class="app-screen asset-detail-screen" id="view-asset-detail" data-screen="asset-detail"></section>
    <section class="app-screen" id="view-news" data-screen="news"></section>

    <section class="app-screen" id="view-watchlist" data-screen="tracking">
      <form class="search-card" id="tracking-search-form">
        <input id="portfolio-search-input" placeholder="Buscar ticker o empresa para seguimiento" autocomplete="off">
        <button class="round-button" id="portfolio-search-button" type="button" aria-label="Agregar a seguimiento">+</button>
      </form>
      <div id="watchlist-screen-body"></div>
    </section>

    <section class="app-screen" id="view-radar" data-screen="portfolio">
      <button class="primary-button small" type="button" id="portfolio-sim-buy-button">Buscar para comprar</button>
      <div id="portfolio-positions-body"></div>
    </section>

    <section class="app-screen" id="view-alerts" data-screen="alerts"></section>

    <nav class="bottom-nav" aria-label="Navegacion principal">
      <button class="nav-link" type="button" data-view="watchlist">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 17l5-5 4 4 7-9"/><path d="M4 20h16"/></svg>
        </span>
        <span class="nav-label">Seguimiento</span>
      </button>
      <button class="nav-link" type="button" data-view="news">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 5h13a3 3 0 0 1 3 3v11H7a3 3 0 0 1-3-3z"/><path d="M8 9h7M8 13h8M8 17h5"/></svg>
        </span>
        <span class="nav-label">Noticias</span>
      </button>
      <button class="nav-link is-active nav-genesis" type="button" data-view="genesis">
        <span class="nav-icon genesis-g" aria-hidden="true">G</span>
        <span class="nav-label">Genesis</span>
      </button>
      <button class="nav-link" type="button" data-view="radar">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 7h16v12H4z"/><path d="M7 7V5h10v2"/><path d="M16 13h4"/></svg>
        </span>
        <span class="nav-label">Cartera</span>
      </button>
      <button class="nav-link" type="button" data-view="alerts">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9z"/><path d="M10 21h4"/></svg>
        </span>
        <span class="nav-label">Alertas</span>
      </button>
    </nav>
  </main>

  <aside class="asset-sheet" id="asset-sheet" hidden>
    <div class="sheet-backdrop" data-sheet-close></div>
    <section class="sheet-card">
      <button class="sheet-close" type="button" data-sheet-close>Cerrar</button>
      <div id="asset-sheet-body"></div>
    </section>
  </aside>

  <aside class="asset-sheet" id="paper-buy-sheet" hidden>
    <div class="sheet-backdrop" data-paper-cancel></div>
    <form class="sheet-card sheet-form" id="paper-buy-form">
      <button class="sheet-close" type="button" data-paper-cancel>Cancelar</button>
      <span class="app-kicker">Paper trading</span>
      <h2>Compra simulada</h2>
      <input id="paper-buy-ticker" name="ticker" type="hidden">
      <label>
        Activo
        <input id="paper-buy-label" disabled>
      </label>
      <label>
        Precio actual
        <input id="paper-buy-live-price" disabled>
      </label>
      <label>
        Unidades
        <input id="paper-buy-units" name="units" type="number" min="0" step="0.000001" placeholder="10" required>
      </label>
      <label>
        Precio de entrada
        <input id="paper-buy-entry" name="entry_price" type="number" min="0" step="0.0001" required>
      </label>
      <p class="sheet-total" id="paper-buy-total">Total estimado: Sin calcular</p>
      <button class="primary-button" type="submit">Guardar compra simulada</button>
      <p class="muted-note">No compra real. No broker. Solo simulacion paper.</p>
    </form>
  </aside>

  <aside class="asset-sheet" id="news-sheet" hidden>
    <div class="sheet-backdrop" data-news-close onclick="this.closest('.asset-sheet').hidden = true; return false"></div>
    <section class="sheet-card news-detail-sheet">
      <button class="sheet-close" type="button" data-news-close onclick="this.closest('.asset-sheet').hidden = true; return false">Cerrar</button>
      <div id="news-sheet-body"></div>
    </section>
  </aside>

  <aside class="asset-sheet" id="event-sheet" hidden>
    <div class="sheet-backdrop" data-event-close onclick="this.closest('.asset-sheet').hidden = true; return false"></div>
    <section class="sheet-card event-detail-sheet">
      <button class="sheet-close" type="button" data-event-close onclick="this.closest('.asset-sheet').hidden = true; return false">Cerrar</button>
      <div id="event-sheet-body"></div>
    </section>
  </aside>

  <aside class="asset-sheet" id="portfolio-close-modal" hidden>
    <div class="sheet-backdrop" data-close-paper-cancel></div>
    <form class="sheet-card sheet-form" id="portfolio-close-form">
      <button class="sheet-close" type="button" id="portfolio-close-modal-close" data-close-paper-cancel>Cerrar</button>
      <span class="app-kicker">Paper</span>
      <h2 id="portfolio-close-title">Cerrar posicion paper</h2>
      <input id="portfolio-close-ticker" name="ticker" type="hidden">
      <p class="sheet-total" id="portfolio-close-summary">Sin posicion seleccionada.</p>
      <div class="sheet-actions">
        <button class="secondary-button" type="button" id="portfolio-close-cancel" data-close-paper-cancel>Cancelar</button>
        <button class="danger-button" type="submit">Cerrar paper</button>
      </div>
    </form>
  </aside>

  <div class="toast" id="app-toast" role="status" aria-live="polite" hidden></div>
  <script src="./app.js?v=genesis-phase90-render-target"></script>
</body>
</html>
